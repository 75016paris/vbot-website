<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel Tools — TikTok Creator Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    canvas#stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      max-width: 640px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 1.25rem;
    }

    .hero p {
      font-size: 1rem;
      line-height: 1.7;
      color: #aaa;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      border-top: 1px solid #1a1a1a;
    }

    footer a {
      color: #888;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    footer a:hover { color: #fff; }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <main>
    <div class="hero">
      <h1>Channel Tools</h1>
      <p>
        Outil pour créateurs — bot backend sur Google Cloud Platform
        permettant d'automatiser la publication et la planification de vidéos TikTok
        pour gérer votre contenu efficacement.
      </p>
    </div>
  </main>

  <footer>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
  </footer>

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    let W, H, stars, lines;

    const STAR_COUNT = 120;
    const LINE_DIST = 130;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = Array.from({ length: STAR_COUNT }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15,
        r: Math.random() * 1.2 + 0.3,
        a: Math.random() * 0.7 + 0.3,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Move stars
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < 0) s.x = W;
        if (s.x > W) s.x = 0;
        if (s.y < 0) s.y = H;
        if (s.y > H) s.y = 0;
      }

      // Draw constellation lines
      for (let i = 0; i < stars.length; i++) {
        for (let j = i + 1; j < stars.length; j++) {
          const dx = stars[i].x - stars[j].x;
          const dy = stars[i].y - stars[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINE_DIST) {
            const alpha = (1 - dist / LINE_DIST) * 0.18;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(180,180,255,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(stars[i].x, stars[i].y);
            ctx.lineTo(stars[j].x, stars[j].y);
            ctx.stroke();
          }
        }
      }

      // Draw stars
      for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,255,${s.a})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    draw();
  </script>
</body>
</html>
